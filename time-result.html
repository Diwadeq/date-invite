<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Time Has Been Decided 😏</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .heart {
    position: fixed;
    top: -10%;
    font-size: 24px;
    color: rgba(255,255,255,0.7);
    user-select: none;
    pointer-events: none;
    animation: fall linear infinite;
  }
  @keyframes fall {
    to { transform: translateY(115vh) rotate(360deg); }
  }

  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
  }

  #content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    width: 90vw;
    max-width: 600px;
    padding: 0 4vw;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.25);
  }

  h1 {
    font-size: clamp(1.6em, 6.5vw, 2.4em);
    margin-bottom: 0.3em;
  }

  p {
    font-size: clamp(1em, 4vw, 1.2em);
    margin: 0.6em 0;
  }

  .time {
    display: inline-block;
    background: #ffffff;
    color: #d6336c;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 50px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    margin-top: 0.5em;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="content">
    <h1 id="heading">Nice try 😏</h1>
    <p id="message"></p>
    <div class="time" id="realTime">14:00</div>
  </div>
</div>

<script>
  const REAL_TIME = '14:00';
  const params = new URLSearchParams(window.location.search);
  const picked = params.get('picked');

  const heading = document.getElementById('heading');
  const message = document.getElementById('message');

  if (picked === REAL_TIME) {
    heading.textContent = "Wow, what a coincidence 😏";
    message.textContent = `You picked ${picked}... almost like it was the only option all along. See you then 💕`;
  } else if (picked) {
    heading.textContent = "Nice try 😂";
    message.textContent = `You picked ${picked}, but there was only ever one real answer to this question. See you then 💕`;
  } else {
    heading.textContent = "The time has been decided 😏";
    message.textContent = "See you then 💕";
  }

  function spawnHeart() {
    const stage = document.getElementById('stage');
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = ['💕','💖','💗','❤️','💓'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (16 + Math.random() * 20) + 'px';
    const duration = 6 + Math.random() * 6;
    heart.style.animationDuration = duration + 's';
    stage.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
  }
  setInterval(spawnHeart, 500);
</script>

</body>
</html>
